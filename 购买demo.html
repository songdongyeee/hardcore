<body class="antialiased min-h-screen flex items-center justify-center text-gray-300 bg-[#050505] pt-4 pr-4 pb-4 pl-4">

    <!-- Main Modal Container -->
    <div class="w-full max-w-md bg-[#0A0A0A] border border-white/10 rounded-[32px] overflow-hidden shadow-2xl relative">
        
        <!-- Background Ambient Glows -->
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-64 h-64 bg-indigo-500/10 blur-[80px] rounded-full pointer-events-none"></div>

        <!-- Header -->
        <div class="flex justify-between items-center p-6 relative z-10">
            <button class="text-sm font-medium text-gray-500 hover:text-white transition-colors tracking-wide">
                恢复购买
            </button>
            <button class="bg-white/5 hover:bg-white/10 p-2 rounded-full transition-colors backdrop-blur-sm">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="x" class="lucide lucide-x w-5 h-5 text-gray-400"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
            </button>
        </div>

        <!-- Hero Section -->
        <div class="z-10 text-center pt-2 pr-8 pb-6 pl-8 relative">
            <!-- Icon -->
            <div class="mx-auto w-16 h-16 bg-gradient-to-tr from-indigo-500/20 to-purple-500/20 border border-indigo-500/30 rounded-2xl flex items-center justify-center mb-6 glow-effect">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="zap" class="lucide lucide-zap w-8 h-8 text-indigo-400 fill-indigo-400/20"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"></path></svg>
            </div>
            
            <!-- Title -->
            <h1 class="text-3xl font-semibold text-white tracking-tight mb-3 gradient-text">
                升级高级会员
            </h1>
            
            <!-- Subtitle -->
            
        </div>

        <!-- Features List -->
        <div class="px-8 pb-8 space-y-3 relative z-10">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-500/10 p-1 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="unlock" class="lucide lucide-unlock w-4 h-4 text-indigo-400"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>
                </div>
                <span class="text-base font-medium text-gray-300">解锁全部学习材料</span>
            </div>
            <div class="flex items-center gap-3">
                <div class="bg-indigo-500/10 p-1 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="mic" class="lucide lucide-mic w-4 h-4 text-indigo-400"><path d="M12 19v3"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><rect x="9" y="2" width="6" height="13" rx="3"></rect></svg>
                </div>
                <span class="text-base font-medium text-gray-300">录音保存功能</span>
            </div>
            <div class="flex items-center gap-3">
                <div class="bg-indigo-500/10 p-1 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="upload-cloud" class="lucide lucide-upload-cloud w-4 h-4 text-indigo-400"><path d="M12 13v8"></path><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"></path><path d="m8 17 4-4 4 4"></path></svg>
                </div>
                <span class="text-base font-medium text-gray-300">更高的语音上传额度</span>
            </div>
        </div>

        <!-- Pricing Selection -->
        <div class="px-6 space-y-3 mb-6 relative z-10">
            
            <!-- Option 1: Monthly -->
            <label class="group relative flex items-center justify-between p-4 rounded-xl border border-white/5 bg-white/[0.02] hover:bg-white/[0.04] cursor-pointer transition-all">
                <input type="radio" name="plan" class="peer hidden">
                <div class="flex items-center gap-4">
                    <div class="w-5 h-5 rounded-full border border-gray-600 group-hover:border-gray-400 flex items-center justify-center peer-checked:bg-white peer-checked:border-white transition-colors"></div>
                    <div class="flex flex-col">
                        <span class="text-base font-medium text-white">月度会员</span>
                        <span class="text-sm text-gray-500">30分钟上传额度</span>
                    </div>
                </div>
                <div class="text-right">
                    <span class="block text-base font-medium text-white">¥8.00</span>
                    <span class="block text-sm text-gray-500">/月</span>
                </div>
            </label>

            <!-- Option 2: Quarterly -->
            <label class="group relative flex items-center justify-between p-4 rounded-xl border border-white/5 bg-white/[0.02] hover:bg-white/[0.04] cursor-pointer transition-all">
                <input type="radio" name="plan" class="peer hidden">
                <div class="flex items-center gap-4">
                    <div class="w-5 h-5 rounded-full border border-gray-600 group-hover:border-gray-400 flex items-center justify-center peer-checked:bg-white peer-checked:border-white transition-colors"></div>
                    <div class="flex flex-col">
                        <span class="text-base font-medium text-white">季度会员</span>
                        <span class="text-sm text-gray-500" style="">180分钟上传额度</span>
                    </div>
                </div>
                <div class="text-right">
                    <span class="block text-base font-medium text-white">¥25.00</span>
                    <span class="block text-sm text-gray-500">/季</span>
                </div>
            </label>

            <!-- Option 3: Yearly (RECOMMENDED) -->
            <label class="relative flex items-center justify-between p-4 rounded-xl border-2 border-indigo-500/50 bg-indigo-500/5 cursor-pointer shadow-[0_0_20px_-5px_rgba(99,102,241,0.15)] transition-transform active:scale-[0.99]">
                <input type="radio" name="plan" class="hidden" checked="">
                
                <!-- Best Value Badge -->
                <div class="absolute -top-3 right-4 bg-indigo-500 text-white text-[10px] font-semibold px-2 py-0.5 rounded-full tracking-wide uppercase shadow-lg">
                    首推 · 省钱超值
                </div>

                <div class="flex items-center gap-4">
                    <!-- Custom Checkbox for Selected State -->
                    <div class="w-5 h-5 rounded-full bg-indigo-500 flex items-center justify-center shadow-md">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="check" class="lucide lucide-check w-3 h-3 text-white stroke-[3]"><path d="M20 6 9 17l-5-5"></path></svg>
                    </div>
                    <div class="flex flex-col">
                        <span class="text-base font-semibold text-white">年度会员</span>
                        <span class="text-sm font-medium text-indigo-300/80">1200分钟上传额度</span>
                    </div>
                </div>
                <div class="text-right">
                    <span class="block text-lg font-semibold text-white">¥49.00</span>
                    <span class="block text-sm text-indigo-300/80">仅 ¥4.08/月</span>
                </div>
            </label>

        </div>

        <!-- Footer / CTA -->
        <div class="p-6 pt-2 bg-gradient-to-t from-[#0A0A0A] to-transparent">
            <button class="w-full py-4 bg-white text-black font-semibold text-lg rounded-full hover:bg-gray-200 transition-colors shadow-lg active:scale-[0.98] flex items-center justify-center gap-2">
                立即开通会员
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="arrow-right" class="lucide lucide-arrow-right w-5 h-5"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>
            </button>
            <p class="text-center text-xs text-gray-600 mt-4 leading-relaxed px-4">
                确认购买即表示您同意
                <a href="#" class="hover:text-gray-400 underline decoration-gray-700">服务条款</a> &amp; 
                <a href="#" class="hover:text-gray-400 underline decoration-gray-700">隐私政策</a>
            </p>
        </div>

    </div>

    <script>
        lucide.createIcons();
    </script>

</body></html>
