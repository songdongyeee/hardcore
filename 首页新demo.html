                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="star" class="lucide lucide-star w-5 h-5 stroke-[1.5]"><path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"></path></svg>
                            </button>
                        </div>

                        <div class="absolute bottom-0 left-0 w-full p-5">
                            <div class="flex gap-2 mb-2 gap-x-2 gap-y-2">
                                <span class="text-[10px] font-medium text-amber-300 bg-amber-500/20 border-amber-500/20 border rounded pt-0.5 pr-2 pb-0.5 pl-2">自制上传</span>
                                
                            </div>
                            <h4 class="text-lg font-medium text-white tracking-tight leading-tight">The Art of War</h4>
                            <p class="line-clamp-1 text-sm text-zinc-400 mt-1">15:30</p>
                        </div>
                    </div>

                </div>
            </section>
        </main>
    </div>

    <script class="">
        lucide.createIcons();

        let filterActive = false;

        function toggleStar(btn) {
            const icon = btn.querySelector('svg');
            const card = btn.closest('.card-item'); // Might be null for hero
            const isFilled = icon.classList.contains('fill-yellow-400');
            
            if (isFilled) {
                // Unstar
                icon.classList.remove('fill-yellow-400', 'text-yellow-400');
                icon.classList.add('text-zinc-600');
                if(card) card.setAttribute('data-starred', 'false');
                
                // If filter is active, hide this card immediately
                if (filterActive && card) {
                    card.style.display = 'none';
                }
            } else {
                // Star
                icon.classList.remove('text-zinc-600');
                icon.classList.add('fill-yellow-400', 'text-yellow-400');
                if(card) card.setAttribute('data-starred', 'true');
            }
        }

        function toggleFilter() {
            filterActive = !filterActive;
            const icon = document.getElementById('filter-icon');
            const cards = document.querySelectorAll('.card-item');

            if (filterActive) {
                // Active State (Yellow Star)
                icon.classList.remove('text-zinc-500');
                icon.classList.add('text-yellow-400', 'fill-yellow-400');
                
                // Hide non-starred
                cards.forEach(card => {
                    if (card.getAttribute('data-starred') !== 'true') {
                        card.style.display = 'none';
                    }
                });
            } else {
                // Inactive State (Grey Star)
                icon.classList.remove('text-yellow-400', 'fill-yellow-400');
                icon.classList.add('text-zinc-500');
                
                // Show all
                cards.forEach(card => {
                    card.style.display = 'block';
                });
            }
        }
    </script>

</body></html>
