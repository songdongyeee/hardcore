<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Spark - Liquid Glass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Liquid Glass Card Utilities */
        .glass-panel {
            background: rgba(20, 20, 23, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .glass-card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.01) 100%);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* The NEW Liquid Glass Drawer Style */
        .liquid-drawer {
            /* Complex gradient to simulate depth and liquid thickness */
            background: linear-gradient(
                165deg, 
                rgba(255, 255, 255, 0.05) 0%, 
                rgba(10, 10, 10, 0.8) 40%, 
                rgba(5, 5, 5, 0.95) 100%
            );
            backdrop-filter: blur(40px) saturate(120%);
            -webkit-backdrop-filter: blur(40px) saturate(120%);
            
            /* Glass edge effect */
            border-left: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 
                -20px 0 60px rgba(0, 0, 0, 0.6), /* Deep shadow behind */
                inset 1px 0 0 rgba(255, 255, 255, 0.1), /* Inner left highlight */
                inset 0 1px 0 rgba(255, 255, 255, 0.05); /* Top lip highlight */
        }

        .glass-button {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .glass-button:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(255,255,255,0.05);
        }

        /* Smooth Accordion Transition */
        .accordion-content {
            transition: max-height 0.4s cubic-bezier(0.33, 1, 0.68, 1), opacity 0.4s ease;
            max-height: 1000px;
            opacity: 1;
            overflow: hidden;
        }
        .accordion-content.collapsed {
            max-height: 0;
            opacity: 0;
        }
        
        .rotate-icon { transition: transform 0.3s ease; }
    </style>
</head>
<body class="bg-[#050505] text-zinc-100 flex justify-center min-h-screen selection:bg-indigo-500/30">

    <!-- Ambient Background Glows -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-indigo-900/20 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-emerald-900/10 rounded-full blur-[120px]"></div>
    </div>

    <!-- Mobile Container -->
    <div class="w-full max-w-md relative min-h-screen border-x border-white/5 shadow-2xl overflow-hidden bg-black/20">
        
        <!-- Glass Header -->
        <header class="flex items-center justify-between px-6 py-6 sticky top-0 z-30 glass-panel border-x-0 border-t-0">
            <div class="flex items-center gap-3">
                <div class="text-indigo-400 flex items-center justify-center">
                    <iconify-icon icon="solar:stars-minimalistic-linear" width="24" stroke-width="1.5"></iconify-icon>
                </div>
                <h1 class="text-lg font-medium tracking-tight text-white/90">Daily Spark</h1>
            </div>
            <button id="menuBtn" class="p-2 -mr-2 text-zinc-400 hover:text-white transition-colors active:scale-95">
                <iconify-icon icon="solar:hamburger-menu-linear" width="28" stroke-width="1.5"></iconify-icon>
            </button>
        </header>

        <!-- Main Content -->
        <main class="pb-24 overflow-y-auto h-[calc(100vh-80px)] no-scrollbar pt-6">
            
            <!-- Hero Card -->
            <div class="px-5 mb-10">
                <div class="relative w-full aspect-[4/5] rounded-[32px] overflow-hidden group cursor-pointer glass-card p-[1px]">
                    <div class="absolute inset-0 rounded-[32px] overflow-hidden">
                        <!-- Image -->
                        <img id="heroImage" src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&amp;w=1000&amp;auto=format&amp;fit=crop" alt="Abstract" class="absolute inset-0 w-full h-full object-cover transition-transform duration-1000 group-hover:scale-105 opacity-60">
                        
                        <!-- Gradient Overlay -->
                        <div class="absolute inset-0 bg-gradient-to-b from-black/0 via-black/20 to-black/90"></div>
                    </div>
                    
                    <!-- Action Button -->
                    <button class="absolute top-5 right-5 w-10 h-10 rounded-full glass-button flex items-center justify-center text-zinc-300 backdrop-blur-md z-10">
                        <iconify-icon icon="solar:star-linear" width="20" stroke-width="1.5"></iconify-icon>
                    </button>

                    <!-- Content -->
                    <div class="absolute bottom-0 left-0 w-full p-6 z-10">
                        <div class="flex gap-2 mb-3">
                            <span class="px-3 py-1 bg-white/10 backdrop-blur-md border border-white/10 rounded-full text-[11px] font-medium text-white/80 tracking-wide uppercase">
                                Daily Phrase
                            </span>
                        </div>

                        <h2 id="heroTitle" class="text-3xl font-normal tracking-tight text-white mb-3">Fluid Dynamics</h2>
                        
                        <div class="flex items-center gap-4">
                            <span class="text-xs text-zinc-400 font-mono tracking-wider">01:00</span>
                            <div class="flex-1 flex gap-1 h-0.5">
                                <div class="w-1/3 bg-white/80 rounded-full shadow-[0_0_10px_rgba(255,255,255,0.5)]"></div>
                                <div class="w-1/3 bg-white/10 rounded-full"></div>
                                <div class="w-1/3 bg-white/10 rounded-full"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Core Library Section -->
            <div class="px-5">
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center gap-2">
                        <div class="text-emerald-400/80 flex items-center">
                            <iconify-icon icon="solar:library-linear" width="22" stroke-width="1.5"></iconify-icon>
                        </div>
                        <h2 class="text-lg font-medium tracking-tight text-white/90">Recent</h2>
                    </div>
                    
                    <div class="flex gap-3">
                        <button class="w-10 h-10 rounded-full glass-button flex items-center justify-center text-zinc-400 hover:text-white">
                            <iconify-icon icon="solar:tuning-2-linear" width="20" stroke-width="1.5"></iconify-icon>
                        </button>
                    </div>
                </div>

                <!-- Horizontal Scroll -->
                <div class="flex gap-4 overflow-x-auto no-scrollbar pb-10 pl-1">
                    <!-- Card 1 -->
                    <div class="min-w-[85%] aspect-[16/9] glass-card rounded-2xl relative overflow-hidden group">
                         <img src="https://images.unsplash.com/photo-1634152962476-4b8a00e1915c?q=80&amp;w=800&amp;auto=format&amp;fit=crop" class="absolute inset-0 w-full h-full object-cover opacity-40 group-hover:opacity-50 transition-opacity duration-500">
                         <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent"></div>
                         <div class="absolute bottom-5 left-5">
                             <h3 class="text-lg font-medium text-white/90 tracking-tight">Design Systems</h3>
                             <p class="text-zinc-500 text-xs mt-1">Foundations</p>
                         </div>
                    </div>
                    <!-- Card 2 -->
                    <div class="min-w-[85%] aspect-[16/9] glass-card rounded-2xl relative overflow-hidden group">
                         <div class="absolute inset-0 bg-gradient-to-br from-emerald-900/30 to-black/80"></div>
                         <div class="absolute bottom-5 left-5">
                             <h3 class="text-lg font-medium text-white/90 tracking-tight">Nature Patterns</h3>
                             <p class="text-zinc-500 text-xs mt-1">Biomimicry</p>
                         </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- LIQUID GLASS DRAWER -->
        <!-- Backdrop -->
        <div id="drawerBackdrop" class="fixed inset-0 bg-[#000000]/40 backdrop-blur-[2px] z-40 opacity-0 pointer-events-none transition-opacity duration-700"></div>
        
        <!-- Drawer Panel -->
        <div id="drawer" class="fixed top-0 right-0 h-full w-[85%] max-w-[340px] liquid-drawer z-50 transform translate-x-full transition-transform duration-[600ms] cubic-bezier(0.19, 1, 0.22, 1) flex flex-col">
            
            <!-- Drawer Header -->
            <div class="flex items-center justify-between p-6 border-b border-white/5 bg-white/5 relative overflow-hidden">
                <!-- Glossy shine on header -->
                <div class="absolute inset-0 bg-gradient-to-b from-white/5 to-transparent pointer-events-none"></div>
                
                <span class="text-sm font-semibold text-white/80 tracking-widest uppercase relative z-10">Navigation</span>
                <button id="closeDrawerBtn" class="p-2 -mr-2 text-zinc-400 hover:text-white transition relative z-10">
                    <iconify-icon icon="solar:close-circle-linear" width="26" stroke-width="1.5"></iconify-icon>
                </button>
            </div>

            <!-- Drawer Content -->
            <div class="flex-1 overflow-y-auto p-4 space-y-2 no-scrollbar relative">
                
                <!-- Option 1: All Materials -->
                <button class="w-full flex items-center justify-between p-4 rounded-2xl glass-button text-left group mb-6 relative overflow-hidden">
                    <div class="absolute inset-0 bg-white/0 group-hover:bg-white/5 transition-colors duration-500"></div>
                    <div class="flex items-center gap-3 relative z-10">
                        <div class="text-zinc-400 group-hover:text-white transition-colors">
                            <iconify-icon icon="solar:layers-minimalistic-linear" width="20" stroke-width="1.5"></iconify-icon>
                        </div>
                        <span class="text-sm font-medium text-zinc-200 group-hover:text-white">All Materials</span>
                    </div>
                    <iconify-icon icon="solar:arrow-right-linear" width="18" class="relative z-10 text-zinc-600 group-hover:text-white transition-colors"></iconify-icon>
                </button>

                <!-- Section 1: Daily Spark -->
                <div class="space-y-1">
                    <!-- Toggle Header -->
                    <button onclick="toggleSection('dailySparkList', 'dsArrow')" class="w-full flex items-center justify-between p-3 rounded-xl hover:bg-white/10 transition-colors group">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-lg bg-indigo-500/10 flex items-center justify-center text-indigo-400 border border-indigo-500/20 shadow-[0_0_15px_rgba(99,102,241,0.15)]">
                                <iconify-icon icon="solar:stars-minimalistic-linear" width="16" stroke-width="1.5"></iconify-icon>
                            </div>
                            <span class="text-sm font-medium text-white/90">Daily Spark</span>
                        </div>
                        <div id="dsArrow" class="text-zinc-500 transition-transform duration-300">
                            <iconify-icon icon="solar:alt-arrow-down-linear" width="16"></iconify-icon>
                        </div>
                    </button>

                    <!-- Collapsible Content -->
                    <div id="dailySparkList" class="accordion-content pl-4 border-l border-white/5 ml-7 space-y-1">
                        <!-- Item 1 -->
                        <button onclick="loadTopic('Interview Clip', 'Shang Wenjie')" class="w-full flex items-center gap-3 py-3 px-3 rounded-lg hover:bg-white/5 text-left group transition-all duration-300">
                            <iconify-icon icon="solar:microphone-2-linear" width="16" class="text-zinc-500 group-hover:text-indigo-300 flex-shrink-0 transition-colors"></iconify-icon>
                            <span class="text-sm text-zinc-400 group-hover:text-zinc-100 group-hover:translate-x-1 transition-all duration-300 truncate">Shang Wenjie Interview</span>
                        </button>
                        <!-- Item 2 -->
                        <button onclick="loadTopic('Philosophy', 'Modern Thoughts')" class="w-full flex items-center gap-3 py-3 px-3 rounded-lg hover:bg-white/5 text-left group transition-all duration-300">
                            <iconify-icon icon="solar:book-2-linear" width="16" class="text-zinc-500 group-hover:text-indigo-300 flex-shrink-0 transition-colors"></iconify-icon>
                            <span class="text-sm text-zinc-400 group-hover:text-zinc-100 group-hover:translate-x-1 transition-all duration-300 truncate">Modern Philosophy</span>
                        </button>
                    </div>
                </div>

                <!-- Section 2: Core Library -->
                <div class="space-y-1 pt-4">
                    <!-- Toggle Header -->
                    <button onclick="toggleSection('coreLibList', 'clArrow')" class="w-full flex items-center justify-between p-3 rounded-xl hover:bg-white/10 transition-colors group">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-lg bg-emerald-500/10 flex items-center justify-center text-emerald-400 border border-emerald-500/20 shadow-[0_0_15px_rgba(16,185,129,0.15)]">
                                <iconify-icon icon="solar:library-linear" width="16" stroke-width="1.5"></iconify-icon>
                            </div>
                            <span class="text-sm font-medium text-white/90">Core Library</span>
                        </div>
                        <div id="clArrow" class="text-zinc-500 transition-transform duration-300">
                            <iconify-icon icon="solar:alt-arrow-down-linear" width="16"></iconify-icon>
                        </div>
                    </button>

                    <!-- Collapsible Content -->
                    <div id="coreLibList" class="accordion-content pl-4 border-l border-white/5 ml-7 space-y-1">
                        <!-- Item 1 -->
                        <button onclick="loadTopic('BBC News', 'Global Update')" class="w-full flex items-center gap-3 py-3 px-3 rounded-lg hover:bg-white/5 text-left group transition-all duration-300">
                            <iconify-icon icon="solar:globe-linear" width="16" class="text-zinc-500 group-hover:text-emerald-300 flex-shrink-0 transition-colors"></iconify-icon>
                            <span class="text-sm text-zinc-400 group-hover:text-zinc-100 group-hover:translate-x-1 transition-all duration-300 truncate">BBC Global News</span>
                        </button>
                        <!-- Item 2 -->
                        <button onclick="loadTopic('TED Talks', 'Innovation')" class="w-full flex items-center gap-3 py-3 px-3 rounded-lg hover:bg-white/5 text-left group transition-all duration-300">
                            <iconify-icon icon="solar:lightbulb-linear" width="16" class="text-zinc-500 group-hover:text-emerald-300 flex-shrink-0 transition-colors"></iconify-icon>
                            <span class="text-sm text-zinc-400 group-hover:text-zinc-100 group-hover:translate-x-1 transition-all duration-300 truncate">TED Talks 2024</span>
                        </button>
                    </div>
                </div>

            </div>
            
            <!-- Drawer Footer -->
            <div class="p-6 border-t border-white/5 bg-white/5 relative">
                 <div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent pointer-events-none"></div>
                <button class="w-full py-3 bg-zinc-100 relative z-10 text-black font-semibold rounded-xl hover:bg-white transition flex items-center justify-center gap-2 shadow-[0_0_20px_rgba(255,255,255,0.2)]">
                    <iconify-icon icon="solar:login-2-linear" width="20"></iconify-icon>
                    <span>Sign In</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Drawer Logic
        const menuBtn = document.getElementById('menuBtn');
        const closeDrawerBtn = document.getElementById('closeDrawerBtn');
        const drawer = document.getElementById('drawer');
        const backdrop = document.getElementById('drawerBackdrop');
        const heroTitle = document.getElementById('heroTitle');
        const heroImage = document.getElementById('heroImage');

        function openDrawer() {
            drawer.classList.remove('translate-x-full');
            drawer.classList.add('translate-x-0');
            backdrop.classList.remove('opacity-0', 'pointer-events-none');
            backdrop.classList.add('opacity-100', 'pointer-events-auto');
        }

        function closeDrawer() {
            drawer.classList.remove('translate-x-0');
            drawer.classList.add('translate-x-full');
            backdrop.classList.remove('opacity-100', 'pointer-events-auto');
            backdrop.classList.add('opacity-0', 'pointer-events-none');
        }

        menuBtn.addEventListener('click', openDrawer);
        closeDrawerBtn.addEventListener('click', closeDrawer);
        backdrop.addEventListener('click', closeDrawer);

        // Accordion Logic
        function toggleSection(listId, arrowId) {
            const list = document.getElementById(listId);
            const arrow = document.getElementById(arrowId);
            
            list.classList.toggle('collapsed');
            
            if (list.classList.contains('collapsed')) {
                arrow.style.transform = 'rotate(-90deg)';
            } else {
                arrow.style.transform = 'rotate(0deg)';
            }
        }

        // Load Topic Logic
        function loadTopic(title, subtitle) {
            closeDrawer();
            
            // Simple visual feedback
            heroTitle.style.opacity = '0';
            
            setTimeout(() => {
                heroTitle.innerText = title;
                // Add randomization for demo effect
                const hues = [0, 60, 120, 200, 270];
                const randomHue = hues[Math.floor(Math.random() * hues.length)];
                heroImage.style.filter = `hue-rotate(${randomHue}deg)`;
                
                heroTitle.style.opacity = '1';
            }, 300);
        }
    </script>

</body></html>
